<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢字勉強アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
        .toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 50;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
        }
        .toast.show { visibility: visible; opacity: 1; bottom: 50px; }
        .answer-kanji { font-size: 8rem; line-height: 1; }
        .hidden-view { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 p-4 md:p-8">

    <!-- 練習ビュー (Main View) -->
    <div id="practice-view" class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-2">
            <h1 class="text-2xl font-bold text-gray-700">中一漢字勉強</h1>
            <button onclick="switchView('list')" class="bg-gray-600 hover:bg-gray-700 text-white text-sm px-4 py-2 rounded-lg transition-colors shadow-sm">
                データ一覧を表示
            </button>
        </div>
        <p class="text-xs text-gray-500 mb-6">データ元: kanji_data.csv</p>

        <!-- 設定エリア -->
        <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200 mb-6 flex flex-wrap items-center gap-4">
            <div class="flex items-center">
                <label for="startNum" class="mr-2 text-sm font-medium">開始番号:</label>
                <input type="number" id="startNum" value="1" min="1" class="border rounded px-2 py-1 w-20 text-center focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div class="flex items-center">
                <label for="endNum" class="mr-2 text-sm font-medium">終了番号:</label>
                <input type="number" id="endNum" value="100" min="1" class="border rounded px-2 py-1 w-20 text-center bg-yellow-50 focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div class="flex gap-2">
                <button onclick="loadQuestionsFromCSV()" class="text-xs bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded transition-colors">CSVを再読込</button>
                <button onclick="downloadCSV()" class="text-xs bg-green-100 text-green-700 hover:bg-green-200 px-3 py-1 rounded transition-colors flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    CSVダウンロード
                </button>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-6">
            <!-- 左側：問題・答えエリア -->
            <div class="flex-1 space-y-6">
                <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                    <h2 class="text-lg font-bold p-3 bg-gray-100 border-b">問題</h2>
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b text-sm text-gray-600">
                                <th class="p-3 border-r w-1/6 text-center">番号</th>
                                <th class="p-3 border-r w-1/6">音読み</th>
                                <th class="p-3 border-r w-1/4">訓読み</th>
                                <th class="p-3 w-5/12">熟語</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td id="q-num" class="p-3 border-r text-center text-xl font-bold h-14"></td>
                                <td id="q-on" class="p-3 border-r text-lg"></td>
                                <td id="q-kun" class="p-3 border-r text-lg"></td>
                                <td id="q-jukugo" class="p-3 text-lg"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden flex flex-col h-64 md:h-80">
                    <h2 class="text-lg font-bold p-3 bg-gray-100 border-b">答え</h2>
                    <div class="flex-1 flex items-center justify-center relative">
                        <span id="answer-text" class="answer-kanji text-gray-800 select-all font-serif"></span>
                        <div id="score-display" class="absolute bottom-4 right-4 text-sm text-gray-500 hidden">
                            累計成績: <span class="text-green-600 font-bold">〇 <span id="score-correct">0</span></span> / <span class="text-red-600 font-bold">× <span id="score-incorrect">0</span></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右側：操作ボタンエリア -->
            <div class="w-full md:w-64 flex flex-col gap-4">
                <button onclick="refreshQuestion()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-6 rounded-lg shadow-md transition-colors text-lg">問題刷新</button>
                <button onclick="showAnswer()" class="bg-white hover:bg-gray-100 text-blue-600 font-bold py-4 rounded-lg shadow border border-blue-600 transition-colors text-lg">答え表示</button>
                <div class="flex gap-4 mt-4">
                    <button onclick="markCorrect()" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-8 rounded-lg shadow transition-colors text-4xl flex items-center justify-center">〇</button>
                    <button onclick="markIncorrect()" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-8 rounded-lg shadow transition-colors text-4xl flex items-center justify-center">×</button>
                </div>
            </div>
        </div>
    </div>

    <!-- データ一覧ビュー (List View) -->
    <div id="list-view" class="max-w-6xl mx-auto hidden-view">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-700">漢字データ一覧</h1>
            <button onclick="switchView('practice')" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition-colors shadow-md">
                ← 練習に戻る
            </button>
        </div>
        
        <div class="bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-sm text-gray-600 border-b">
                            <th class="p-4 border-r text-center w-16">ID</th>
                            <th class="p-4 border-r text-center w-24">漢字</th>
                            <th class="p-4 border-r w-32">音読み</th>
                            <th class="p-4 border-r w-32">訓読み</th>
                            <th class="p-4 border-r">熟語</th>
                            <th class="p-4 text-center w-24">〇</th>
                            <th class="p-4 text-center w-24">×</th>
                        </tr>
                    </thead>
                    <tbody id="csv-table-body">
                        <!-- データは動的に挿入されます -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="toast" class="toast shadow-lg border border-gray-600"></div>

    <script>
        let questions = [];
        let currentQuestion = null;

        function showMessage(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        /**
         * ビュー切り替え
         */
        function switchView(viewName) {
            const practice = document.getElementById('practice-view');
            const list = document.getElementById('list-view');

            if (viewName === 'list') {
                practice.classList.add('hidden-view');
                list.classList.remove('hidden-view');
                renderDataTable();
            } else {
                list.classList.add('hidden-view');
                practice.classList.remove('hidden-view');
            }
        }

        /**
         * データテーブルのレンダリング
         */
        function renderDataTable() {
            const tbody = document.getElementById('csv-table-body');
            tbody.innerHTML = '';

            if (questions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="p-10 text-center text-gray-400">データが読み込まれていません。</td></tr>';
                return;
            }

            questions.forEach(q => {
                const tr = document.createElement('tr');
                tr.className = "border-b hover:bg-blue-50 transition-colors";
                tr.innerHTML = `
                    <td class="p-4 border-r text-center font-mono text-gray-500">${q.id}</td>
                    <td class="p-4 border-r text-center text-2xl font-serif font-bold text-gray-800">${q.kanji}</td>
                    <td class="p-4 border-r text-gray-700">${q.onyomi}</td>
                    <td class="p-4 border-r text-gray-700">${q.kunyomi}</td>
                    <td class="p-4 border-r text-gray-700 text-sm">${q.jukugo}</td>
                    <td class="p-4 text-center text-green-600 font-bold">${q.correct}</td>
                    <td class="p-4 text-center text-red-600 font-bold">${q.incorrect}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        /**
         * CSVファイルを読み込む関数
         * 指定された範囲の番号のみを読み込むように修正
         */
        async function loadQuestionsFromCSV() {
            const start = parseInt(document.getElementById('startNum').value, 10);
            const end = parseInt(document.getElementById('endNum').value, 10);

            try {
                const response = await fetch('kanji_data.csv', { cache: 'no-cache' });
                if (!response.ok) throw new Error('CSVファイルが見つかりません。');
                
                const csvText = await response.text();
                const rows = parseCSV(csvText);

                questions = [];
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (row.length >= 5 && row[0]) {
                        const id = parseInt(row[0], 10);
                        // 指定された範囲内（開始番号〜終了番号）のIDのみ配列に追加
                        if (id >= start && id <= end) {
                            questions.push({
                                id: id,
                                kanji: row[1] || "",
                                onyomi: row[2] || "-",
                                kunyomi: row[3] || "-",
                                jukugo: row[4] || "-",
                                correct: parseInt(row[5], 10) || 0,
                                incorrect: parseInt(row[6], 10) || 0
                            });
                        }
                    }
                }
                
                if(questions.length > 0) {
                    showMessage(`番号 ${start} から ${end} の範囲で ${questions.length} 件のデータを読み込みました。`);
                } else {
                    showMessage(`指定された範囲（${start}〜${end}）にデータが見つかりませんでした。`);
                }
                
                // 読み込み後、現在の問題が範囲外になった場合に備えてリセット
                currentQuestion = null;
                document.getElementById('q-num').textContent = '';
                document.getElementById('q-on').textContent = '';
                document.getElementById('q-kun').textContent = '';
                document.getElementById('q-jukugo').textContent = '';
                document.getElementById('answer-text').textContent = '';
                updateScoreDisplay();

            } catch (error) {
                console.error(error);
                showMessage('読み込み失敗: サーバー環境で実行してください。');
            }
        }

        /**
         * CSVをダウンロードする関数
         */
        function downloadCSV() {
            if (questions.length === 0) {
                showMessage("データがないためダウンロードできません。");
                return;
            }

            // ヘッダー
            let csvContent = "ID,Kanji,On-yomi,Kun-yomi,Jukugo,Correct,Incorrect\n";
            
            // 各行を生成
            questions.forEach(q => {
                const row = [
                    q.id,
                    `"${q.kanji.replace(/"/g, '""')}"`,
                    `"${q.onyomi.replace(/"/g, '""')}"`,
                    `"${q.kunyomi.replace(/"/g, '""')}"`,
                    `"${q.jukugo.replace(/"/g, '""')}"`,
                    q.correct,
                    q.incorrect
                ].join(",");
                csvContent += row + "\n";
            });

            // Blob作成とダウンロード実行
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "kanji_data.csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showMessage("表示中のデータをCSVとしてダウンロードしました。");
        }

        /**
         * サーバー上のCSVを更新 (POST)
         */
        async function updateCSVOnServer(id, isCorrect) {
            try {
                const response = await fetch('/api/update-score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, isCorrect })
                });

                if (response.ok) {
                    const q = questions.find(item => item.id === id);
                    if (q) {
                        if (isCorrect) q.correct++; else q.incorrect++;
                        updateScoreDisplay();
                    }
                    showMessage("記録をサーバーに保存しました。");
                } else {
                    throw new Error("保存失敗");
                }
            } catch (error) {
                console.error(error);
                showMessage("保存失敗: APIが応答していません。");
            }
        }

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            return lines.map(line => {
                const result = [];
                let current = "";
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) {
                        result.push(current.trim());
                        current = "";
                    } else current += char;
                }
                result.push(current.trim());
                return result;
            }).filter(row => row.length > 1);
        }

        function updateScoreDisplay() {
            const scoreContainer = document.getElementById('score-display');
            if (currentQuestion) {
                const q = questions.find(item => item.id === currentQuestion.id);
                if (q) {
                    document.getElementById('score-correct').textContent = q.correct;
                    document.getElementById('score-incorrect').textContent = q.incorrect;
                    scoreContainer.classList.remove('hidden');
                } else {
                    scoreContainer.classList.add('hidden');
                }
            } else {
                scoreContainer.classList.add('hidden');
            }
        }

        function refreshQuestion() {
            if (questions.length === 0) {
                showMessage('データがありません。「CSVを再読込」してください。');
                return;
            }
            
            // 既にロード時に範囲指定されているため、questions 配列からランダムに選ぶだけでOK
            currentQuestion = questions[Math.floor(Math.random() * questions.length)];
            
            document.getElementById('q-num').textContent = currentQuestion.id;
            document.getElementById('q-on').textContent = currentQuestion.onyomi;
            document.getElementById('q-kun').textContent = currentQuestion.kunyomi;
            document.getElementById('q-jukugo').textContent = currentQuestion.jukugo;
            document.getElementById('answer-text').textContent = '';
            updateScoreDisplay();
        }

        function showAnswer() {
            if (!currentQuestion) return;
            document.getElementById('answer-text').textContent = currentQuestion.kanji;
        }

        function markCorrect() {
            if (!currentQuestion) return;
            updateCSVOnServer(currentQuestion.id, true);
        }

        function markIncorrect() {
            if (!currentQuestion) return;
            updateCSVOnServer(currentQuestion.id, false);
        }

        window.onload = loadQuestionsFromCSV;
    </script>
</body>
</html>
